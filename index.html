<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GRAMVERTER — real-time crypto & fiat converter. Convert crypto to fiat, fiat to crypto, and crypto to crypto with live market data." />
  <title>GRAMVERTER — Real-Time Crypto & Fiat Converter</title>

  <!-- Canonical -->
  <link rel="canonical" href="https://gramverter.vercel.app/" />

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="GRAMVERTER" />
  <meta property="og:title" content="GRAMVERTER — Real-Time Crypto & Fiat Converter" />
  <meta property="og:description" content="Convert any token instantly. Crypto ↔ fiat, fiat ↔ crypto, and crypto ↔ crypto with live prices. 100+ tokens, 19 currencies incl. Naira. Free, no signup." />
  <meta property="og:url" content="https://gramverter.vercel.app/" />
  <meta property="og:image" content="https://gramverter.vercel.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="GRAMVERTER — real-time crypto and fiat converter" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="GRAMVERTER — Real-Time Crypto & Fiat Converter" />
  <meta name="twitter:description" content="Convert any token instantly. Crypto ↔ fiat, fiat ↔ crypto, crypto ↔ crypto with live prices. 100+ tokens, 19 currencies incl. Naira. Free." />
  <meta name="twitter:image" content="https://gramverter.vercel.app/og-image.png" />
  <meta name="twitter:image:alt" content="GRAMVERTER — real-time crypto and fiat converter" />
  <meta name="twitter:creator" content="@TheFiregram" />

  <meta name="theme-color" content="#0a0b14" />

  <!-- Favicons / app icons -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <link rel="preconnect" href="https://api.coingecko.com" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="app">
    <header class="app__header">
      <h1 class="logo">GRAM<span>VERTER</span></h1>
      <p class="tagline">Real-time crypto &amp; fiat conversion</p>
    </header>

    <section class="card" aria-label="Converter">
      <div class="field">
        <label class="field__label" for="amount">You convert</label>
        <div class="field__row">
          <input
            id="amount"
            class="field__amount"
            type="text"
            inputmode="decimal"
            autocomplete="off"
            value="1"
            aria-label="Amount to convert"
          />
          <div class="combo" id="combo-from">
            <button type="button" class="combo__button" aria-haspopup="listbox" aria-expanded="false">
              <span class="combo__label">…</span>
              <span class="combo__caret" aria-hidden="true"></span>
            </button>
            <div class="combo__pop" hidden>
              <input type="text" class="combo__search" placeholder="Search token…" autocomplete="off" aria-label="Search token" />
              <ul class="combo__list" role="listbox" tabindex="-1"></ul>
            </div>
          </div>
        </div>
      </div>

      <button id="swap" class="swap" type="button" aria-label="Swap currencies" title="Swap">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <path d="M7 4v13M7 4L4 7m3-3l3 3M17 20V7m0 13l3-3m-3 3l-3-3"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="field">
        <label class="field__label" for="result">You get</label>
        <div class="field__row">
          <input
            id="result"
            class="field__amount field__amount--result"
            type="text"
            readonly
            value="—"
            aria-label="Converted amount"
          />
          <div class="combo" id="combo-to">
            <button type="button" class="combo__button" aria-haspopup="listbox" aria-expanded="false">
              <span class="combo__label">…</span>
              <span class="combo__caret" aria-hidden="true"></span>
            </button>
            <div class="combo__pop" hidden>
              <input type="text" class="combo__search" placeholder="Search token…" autocomplete="off" aria-label="Search token" />
              <ul class="combo__list" role="listbox" tabindex="-1"></ul>
            </div>
          </div>
        </div>
      </div>

      <div class="rate" id="rate" aria-live="polite">Loading live market data…</div>
    </section>

    <footer class="app__footer">
      <div class="status">
        <span id="updated" class="status__updated">—</span>
        <button id="refresh" class="status__refresh" type="button">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5"
                  fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Refresh
        </button>
      </div>
      <p class="credit">Prices by <a href="https://www.coingecko.com" target="_blank" rel="noopener">CoinGecko</a> · for reference only</p>
      <p class="built-by">
        <a href="https://x.com/TheFiregram" target="_blank" rel="noopener" aria-label="Built by Firegram on X">
          <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">
            <path d="M18.9 1.6h3.7l-8 9.2 9.4 12.5h-7.4l-5.8-7.6-6.6 7.6H.5l8.6-9.8L0 1.6h7.6l5.2 6.9 6.1-6.9Zm-1.3 19.8h2L6.5 3.7H4.4l13.2 17.7Z"
                  fill="currentColor"/>
          </svg>
          Built by @TheFiregram
        </a>
      </p>
    </footer>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
